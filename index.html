<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>수학은 어려워도 시 쓰기는 재미있어</title>
<meta name="theme-color" content="#2A2724">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'SeoulNotice';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2505-1@1.0/SeoulAlrimTTF-Bold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
  }
  @font-face {
    font-family: 'SeoulNotice';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2505-1@1.0/SeoulAlrimTTF-ExtraBold.woff2') format('woff2');
    font-weight: 800;
    font-display: swap;
  }
  :root{
    --wall:#26221f;
    --wall-soft:#322c27;
    --paper:#F5ECDA;
    --paper-line:#e6d8b8;
    --ink:#2b2620;
    --ink-soft:#6b6152;
    --gold:#c9a227;
    --gold-soft:#d9bd66;
    --cream:#f4ecdd;
    --font-title:'SeoulNotice', 'Noto Sans KR', sans-serif;
    --font-ui:'Noto Sans KR', sans-serif;
  }
  *{box-sizing:border-box;}
  
  html,body{
    margin:0;padding:0;
    width:100%; height:100%;
    overflow:hidden;
    background:var(--wall);
    font-family:var(--font-ui);
    color:var(--ink);
    overscroll-behavior:none;
  }

  /* ---------- 반응형 가상 뷰포트 (세로를 줄여서 레터박스 최소화) ---------- */
  #app-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 420px;   /* 기준 너비 */
    height: 700px;  /* 기준 높이를 700px로 줄여 위아래 여백 축소 */
    transform: translate(-50%, -50%);
    transform-origin: center center;
    overflow: hidden;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
  }

  button{font-family:var(--font-ui); cursor:pointer;}
  input{font-family:var(--font-ui);}

  /* ---------- SWIPER ---------- */
  .swiper{
    display:flex;
    width:420px;
    height:700px;
    overflow-x:auto;
    overflow-y:hidden;
    scroll-snap-type:x mandatory;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
  }
  .swiper::-webkit-scrollbar{ display:none; }
  .page{
    flex:0 0 420px;
    width:420px;
    height:700px;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }

  /* ---------- COVER PAGE ---------- */
  .cover-page{
    background: radial-gradient(ellipse at 50% 0%, #3a332c 0%, var(--wall) 65%);
  }
  .cover-card{
    width:380px;
    background:var(--paper);
    border-radius:8px;
    padding:28px 20px 20px;
    text-align:center;
    box-shadow:0 30px 70px rgba(0,0,0,.5);
    position:relative;
  }
  .cover-card::before{
    content:"";
    position:absolute; inset:10px;
    border:1px solid var(--paper-line);
    border-radius:4px;
    pointer-events:none;
  }
  .cover-title{
    font-family:var(--font-title);
    font-weight:800;
    font-size:30px;
    line-height:1.3;
    margin:0 0 12px;
    color:var(--ink);
  }
  .cover-rule{
    width:48px; height:2px; background:var(--gold);
    margin:0 auto 12px;
  }
  .cover-author{
    font-family:var(--font-ui);
    font-size:13px;
    color:var(--ink-soft);
    margin:0 0 18px;
    letter-spacing:.02em;
  }
  .cover-author b{ color:var(--ink); font-weight:700; }

  .guestbook{
    border-top:1px dashed var(--paper-line);
    padding-top:14px;
  }
  .guestbook-label{
    font-family:var(--font-ui);
    font-weight:700;
    font-size:14px;
    margin:0 0 8px;
  }
  #nameForm{ display:flex; gap:6px; }
  #visitorName{
    flex:1;
    min-width:0;
    font-size:14px;
    padding:7px 8px;
    border:1px solid var(--paper-line);
    border-radius:6px;
    background:#fffdf8;
    color:var(--ink);
  }
  #visitorName:focus{ outline:none; border-color:var(--gold); }
  #nameForm button{
    flex:0 0 auto;
    white-space:nowrap;
    background:var(--ink);
    color:var(--cream);
    border:none;
    padding:7px 12px;
    border-radius:6px;
    font-size:12px;
    font-weight:700;
  }
  #nameForm button:active{ transform:scale(.97); }
  #nameForm button:disabled{ opacity:.5; }
  .guestbook-msg{
    min-height:16px;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:6px;
  }
  .guestbook-msg.show{ color:#7a5b1e; font-weight:700; }

  .swipe-hint{
    margin-top:16px;
    font-family:var(--font-ui);
    font-size:11px;
    color:var(--ink-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .swipe-hint .arrow{
    display:inline-block;
    animation:nudge 1.6s ease-in-out infinite;
  }
  @keyframes nudge{
    0%,100%{ transform:translateX(0); opacity:.5; }
    50%{ transform:translateX(6px); opacity:1; }
  }

  /* ---------- POEM PAGE ---------- */
  .poem-page{ background:var(--wall); }
  .poem-frame{
    width:380px;
    height:580px; /* 시 사진 프레임 크기도 적절히 최적화 */
    background:#fff;
    border-radius:4px;
    box-shadow:0 26px 60px rgba(0,0,0,.55);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:6px;
  }
  .poem-frame img{
    width:100%; height:100%;
    object-fit:contain;
    display:block;
  }

  /* ---------- CLOSING PAGE ---------- */
  .closing-page{
    background:var(--cream);
    text-align:center;
  }
  .closing-date{
    font-family:var(--font-ui);
    font-weight:700;
    font-size:24px;
    color:var(--ink);
    margin:0 0 14px;
    letter-spacing:.03em;
  }
  .closing-place{
    font-family:var(--font-ui);
    font-size:16px;
    color:var(--ink-soft);
    margin:0;
  }

  /* ---------- NAV UI (fixed, shared) ---------- */
  .nav-btn{
    position:absolute;
    top:50%; transform:translateY(-50%);
    width:38px; height:38px;
    border-radius:50%;
    border:1px solid rgba(244,236,215,.25);
    background:rgba(0,0,0,.28);
    color:#f4ecd7;
    font-size:16px;
    z-index:30;
    display:flex; align-items:center; justify-content:center;
  }
  .nav-btn.prev{ left:10px; }
  .nav-btn.next{ right:10px; }
  .nav-btn:disabled{ opacity:0; pointer-events:none; }

  .page-counter{
    position:absolute;
    left:50%; bottom:14px; transform:translateX(-50%);
    font-family:var(--font-ui);
    font-size:11px;
    color:rgba(244,236,215,.75);
    background:rgba(0,0,0,.28);
    padding:4px 10px;
    border-radius:999px;
    z-index:30;
    letter-spacing:.05em;
  }

  .admin-trigger{
    position:absolute; right:10px; bottom:10px;
    width:30px; height:30px; border-radius:50%;
    border:1px solid rgba(244,236,215,.25);
    background:rgba(0,0,0,.28); color:#f4ecd7bb; font-size:13px;
    z-index:40;
  }
  .admin-panel{
    position:absolute; inset:0; background:rgba(10,10,9,.72);
    display:flex; align-items:center; justify-content:center; z-index:60; padding:20px;
  }
  .admin-card{
    background:var(--paper); border-radius:10px; padding:22px;
    width:100%; max-height:80vh; overflow:auto;
  }
  .admin-card h2{ font-family:var(--font-ui); font-weight:700; margin:0 0 4px; color:var(--ink); }
  .admin-sub{ font-size:12px; color:var(--ink-soft); margin:0 0 14px; }
  .admin-sub a{ color:#7a5b1e; }
  .visitor-row{
    display:flex; justify-content:space-between; padding:8px 0;
    border-bottom:1px solid rgba(0,0,0,.08); font-size:14px;
  }
  .visitor-row time{ color:var(--ink-soft); font-size:12px; }
  .admin-actions{ display:flex; gap:10px; margin-top:14px; }
  .admin-actions button{
    border:none; border-radius:8px; padding:8px 12px; font-size:13px; font-weight:700;
  }
  #closeAdmin{ background:var(--ink); color:var(--paper); }
  #copyList{ background:#4a4237; color:#fff; }
  .empty-note{ font-size:13px; color:var(--ink-soft); }

  [hidden]{ display:none !important; }
</style>
</head>
<body>

<div id="app-wrapper">
  <div class="swiper" id="swiper">

    <section class="page cover-page">
      <div class="cover-card">
        <h1 class="cover-title">수학은 어려워도<br>시 쓰기는 재미있어</h1>
        <div class="cover-rule"></div>
        <p class="cover-author">지은이 · <b>프린세스패밀리</b></p>

        <div class="guestbook">
          <p class="guestbook-label">방문자의 이름은?</p>
          <form id="nameForm" autocomplete="off">
            <input id="visitorName" type="text" placeholder="이름을 적어주세요" maxlength="20" required>
            <button type="submit">남기기</button>
          </form>
          <p class="guestbook-msg" id="guestbookMsg"></p>
        </div>

        <p class="swipe-hint" id="swipeHint">이름을 남기면 시를 만나볼 수 있어요 ✎</p>
      </div>
    </section>

    <!-- 시 페이지는 JS가 무작위 순서로 여기 채워 넣습니다 -->

    <section class="page closing-page">
      <p class="closing-date">2026. 7. 20.</p>
      <p class="closing-place">볕이 내리쬐는 별관 4층에서</p>
    </section>

  </div>

  <button class="nav-btn prev" id="prevBtn" aria-label="이전">←</button>
  <button class="nav-btn next" id="nextBtn" aria-label="다음">→</button>
  <div class="page-counter" id="pageCounter">1 / 23</div>

  <button class="admin-trigger" id="adminTrigger" title="관리자">⚙</button>
  <div class="admin-panel" id="adminPanel" hidden>
    <div class="admin-card">
      <h2>방문자 목록</h2>
      <p class="admin-sub">이 시집을 열어본 방문자들의 이름입니다.</p>
      <div id="visitorList"></div>
      <div class="admin-actions">
        <button id="copyList">이름 복사하기</button>
        <button id="closeAdmin">닫기</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- 화면에 꽉 차도록(여백을 최소화하도록) 스케일 계산 방식 수정 ---
function resizeApp() {
  const wrapper = document.getElementById('app-wrapper');
  const baseWidth = 420;
  const baseHeight = 700; // 수정된 높이 기준
  
  const clientWidth = window.innerWidth;
  const clientHeight = window.innerHeight;

  const scaleX = clientWidth / baseWidth;
  const scaleY = clientHeight / baseHeight;
  
  // 스마트폰 화면 비율에 따라 꽉 차게 보이도록 max 혹은 min 선택 (여기서는 여백을 줄이기 위해 max 활용 또는 화면에 알맞게 조절)
  // 세로 레터박스를 없애고 싶다면 Math.max를 사용하거나, 전체가 잘리지 않게 하려면 Math.min을 사용합니다.
  const scale = Math.min(scaleX, scaleY); 

  wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
}
window.addEventListener('resize', resizeApp);
window.addEventListener('DOMContentLoaded', resizeApp);

(function(){
  const swiper = document.getElementById('swiper');
  const closingPage = document.querySelector('.closing-page');

  const poemFiles = Array.from({length:21}, (_, i) => 'poems/' + String(i+1).padStart(2,'0') + '.jpg');
  for(let i = poemFiles.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [poemFiles[i], poemFiles[j]] = [poemFiles[j], poemFiles[i]];
  }
  poemFiles.forEach((src, idx) => {
    const sec = document.createElement('section');
    sec.className = 'page poem-page';
    sec.innerHTML = '<div class="poem-frame"><img src="' + src + '" alt="시 ' + (idx+1) + '" loading="lazy"></div>';
    swiper.insertBefore(sec, closingPage);
  });

  const pages = Array.from(document.querySelectorAll('.page'));
  const N = pages.length;
  let current = 0;
  let submitted = false;

  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const counter = document.getElementById('pageCounter');

  function updateNav(){
    prevBtn.disabled = current <= 0;
    nextBtn.disabled = (current >= N - 1) || (current === 0 && !submitted);
    counter.textContent = (current+1) + ' / ' + N;
  }
  function goTo(i){
    if(i > current && current === 0 && !submitted) return; 
    i = Math.max(0, Math.min(N-1, i));
    swiper.scrollTo({ left: i * swiper.clientWidth, behavior:'smooth' });
  }
  prevBtn.addEventListener('click', ()=> goTo(current - 1));
  nextBtn.addEventListener('click', ()=> goTo(current + 1));

  let scrollTimer = null;
  swiper.addEventListener('scroll', ()=>{
    if(scrollTimer) clearTimeout(scrollTimer);
    scrollTimer = setTimeout(()=>{
      const landed = Math.round(swiper.scrollLeft / swiper.clientWidth);
      if(landed > 0 && !submitted){
        current = 0;
        swiper.scrollTo({ left: 0, behavior:'auto' });
        updateNav();
        return;
      }
      current = landed;
      updateNav();
    }, 80);
  });

  swiper.addEventListener('touchmove', (e)=>{
    if(current === 0 && !submitted) e.preventDefault();
  }, { passive:false });
  swiper.addEventListener('wheel', (e)=>{
    if(current === 0 && !submitted) e.preventDefault();
  }, { passive:false });

  document.addEventListener('keydown', (e)=>{
    const tag = (document.activeElement && document.activeElement.tagName) || '';
    if(tag === 'INPUT' || tag === 'TEXTAREA') return;
    if(e.key === 'ArrowRight') goTo(current + 1);
    if(e.key === 'ArrowLeft') goTo(current - 1);
  });

  updateNav();

  const form = document.getElementById('nameForm');
  const input = document.getElementById('visitorName');
  const guestbookMsg = document.getElementById('guestbookMsg');

  const SHEET_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwxxy6x39vthqkYcfuD_rgYxwJ_PFgUhfdsyHeT9Ue8eQ4NQFixgtWnOpghILjmNjA4/exec';
  const SHEET_VIEW_URL = 'https://docs.google.com/spreadsheets/d/148b24sTRi-sfy0W0_O2OnNTaQo8qr6PweU-5g8g5xl4/edit?usp=sharing';

  const STORAGE_KEY = 'poembook_visitors';
  const sheetConfigured = () => SHEET_WEBAPP_URL.indexOf('YOUR_') !== 0;

  function saveLocalBackup(entry){
    try{
      const arr = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      arr.push(entry);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    }catch(err){ /* ignore */ }
  }

  async function saveVisitor(name){
    const entry = { name, ts: new Date().toISOString() };
    saveLocalBackup(entry);
    if(!sheetConfigured()) return;
    try{
      await fetch(SHEET_WEBAPP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ name })
      });
    }catch(err){
      console.error('구글시트 저장 실패', err);
    }
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const name = input.value.trim();
    if(!name) return;
    saveVisitor(name);
    guestbookMsg.textContent = name + '님, 반가워요! 남겨주셔서 고마워요.';
    guestbookMsg.classList.add('show');
    input.value = '';
    input.blur();

    submitted = true;
    const hint = document.getElementById('swipeHint');
    if(hint) hint.innerHTML = '시로 넘어가는 중이에요 <span class="arrow">→</span>';
    updateNav();
    setTimeout(()=> goTo(1), 500);
  });

  const adminTrigger = document.getElementById('adminTrigger');
  const adminPanel = document.getElementById('adminPanel');
  const visitorList = document.getElementById('visitorList');
  const closeAdmin = document.getElementById('closeAdmin');
  const copyListBtn = document.getElementById('copyList');
  let lastNames = [];

  adminTrigger.addEventListener('click', ()=>{
    const pw = window.prompt('관리자 비밀번호를 입력하세요');
    if(pw === null || pw.trim()==='') return;
    adminPanel.hidden = false;
    loadVisitors(pw.trim());
  });
  closeAdmin.addEventListener('click', ()=>{ adminPanel.hidden = true; });

  copyListBtn.addEventListener('click', async ()=>{
    try{
      await navigator.clipboard.writeText(lastNames.join('\n'));
      copyListBtn.textContent = '복사됨!';
      setTimeout(()=>copyListBtn.textContent='이름 복사하기', 1500);
    }catch(err){
      alert('복사에 실패했어요.');
    }
  });

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function loadVisitors(adminKey){
    visitorList.innerHTML = '<p class="empty-note">불러오는 중...</p>';
    let entries = [];
    let sourceNote = '';
    let sheetFetchFailed = false;
    let unauthorized = false;

    if(sheetConfigured()){
      try{
        const url = SHEET_WEBAPP_URL + '?key=' + encodeURIComponent(adminKey || '');
        const res = await fetch(url, { method:'GET' });
        const json = await res.json();
        if(json && json.error === 'unauthorized'){
          unauthorized = true;
        } else {
          entries = (json.visitors || []).map(v => ({ name: v.name, ts: v.ts }));
          sourceNote = '(구글시트 · 모든 기기 공통)';
        }
      }catch(err){
        sheetFetchFailed = true;
      }
    }

    if(unauthorized){
      visitorList.innerHTML = '<p class="empty-note">비밀번호가 올바르지 않아요.</p>';
      lastNames = [];
      return;
    }

    if(entries.length===0 && (!sheetConfigured() || sheetFetchFailed)){
      try{
        entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        sourceNote = '(이 브라우저 저장 백업)';
      }catch(err){ /* ignore */ }
    }

    if(entries.length===0){
      visitorList.innerHTML = '<p class="empty-note">아직 방문자가 없어요.</p>';
      lastNames = [];
    } else {
      entries.sort((a,b)=> new Date(b.ts) - new Date(a.ts));
      lastNames = entries.map(e=>e.name);
      visitorList.innerHTML = '<p class="admin-sub">총 ' + entries.length + '명 방문 ' + sourceNote + '</p>' +
        entries.map(e=>{
          const d = new Date(e.ts);
          const timeStr = isNaN(d) ? '' : d.toLocaleString('ko-KR');
          return '<div class="visitor-row"><span>'+ escapeHtml(e.name) +'</span><time>'+ timeStr +'</time></div>';
        }).join('');
    }

    if(sheetConfigured() && SHEET_VIEW_URL.indexOf('YOUR_') !== 0){
      visitorList.innerHTML += '<p class="admin-sub"><a href="'+ SHEET_VIEW_URL +'" target="_blank" rel="noopener">구글시트에서 전체 보기 →</a></p>';
    }
  }
})();
</script>
</body>
</html>
